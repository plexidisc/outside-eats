const total = restaurants.length;
let done = new Set();

function render(list) {
  // Group by street cluster
  const clusters = {};
  list.forEach((r, i) => {
    const street = r.addr.replace(/^\d+\s*/, '').split(' ').slice(0, 3).join(' ');
    if (!clusters[street]) clusters[street] = [];
    clusters[street].push({ ...r, idx: restaurants.indexOf(r) });
  });

  let html = '';
  Object.keys(clusters).sort().forEach(street => {
    html += `<div class="cluster"><div class="cluster-header">${street}</div>`;
    clusters[street].forEach(r => {
      const isDone = done.has(r.idx);
      html += `<div class="row ${isDone ? 'done' : ''}" onclick="toggleDone(${r.idx}, this)">
        <div class="num">${r.idx + 1}</div>
        <div class="info">
          <div class="name">${r.name}</div>
          <div class="meta">${r.addr}</div>
          <span class="cuisine">${r.cuisine}</span>
        </div>
        <div class="check"></div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('listWrap').innerHTML = html;
  updateCount();
}

function toggleDone(idx, row) {
  if (done.has(idx)) { done.delete(idx); row.classList.remove('done'); }
  else { done.add(idx); row.classList.add('done'); }
  updateCount();
}

function updateCount() {
  document.getElementById('countBar').textContent = `${done.size} / ${total} photographed`;
  document.getElementById('totalCount').textContent = `${total} restaurants`;
}

function filterList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? restaurants.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.addr.toLowerCase().includes(q) ||
    r.cuisine.toLowerCase().includes(q)
  ) : restaurants;
  render(filtered);
}

render(restaurants);
