.cuisine { display: inline-block; font-size: 10px; background: #F0F3F8; color: #555; padding: 1px 6px; border-radius: 10px; font-weight: 500; margin-top: 3px; }
.check { width: 24px; height: 24px; border: 2px solid #D0D0CA; border-radius: 50%; flex-shrink: 0; margin-top: 2px; transition: all 0.1s; }
.row.done .check { background: #1B2A4A; border-color: #1B2A4A; position: relative; }
.row.done .check::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.row.done .name { text-decoration: line-through; color: #999; }
.count-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1B2A4A; color: white; padding: 10px 1rem; font-size: 13px; font-weight: 600; text-align: center; }

const total = restaurants.length;
let done = new Set();

function render(list) {
  const clusters = {};
  list.forEach(r => {
    const street = r.addr.replace(/^\d+\s*/, '').split(' ').slice(0, 3).join(' ');
    if (!clusters[street]) clusters[street] = [];
    clusters[street].push({ ...r, idx: restaurants.indexOf(r) });
  });

  let html = '';
  Object.keys(clusters).sort().forEach(street => {
    html += `<div class="cluster"><div class="cluster-header">${street}</div>`;
    clusters[street].forEach(r => {
      const isDone = done.has(r.idx);
      html += `<div class="row ${isDone ? 'done' : ''}" onclick="toggleDone(${r.idx}, this)">
        <div class="num">${r.idx + 1}</div>
        <div class="info">
          <div class="name">${r.name}</div>
          <div class="meta">${r.addr}</div>
          <span class="cuisine">${r.cuisine}</span>
        </div>
        <div class="check"></div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('listWrap').innerHTML = html;
  updateCount();
}

function toggleDone(idx, row) {
  if (done.has(idx)) { done.delete(idx); row.classList.remove('done'); }
  else { done.add(idx); row.classList.add('done'); }
  updateCount();
}

function updateCount() {
  document.getElementById('countBar').textContent = `${done.size} / ${total} photographed`;
}

function filterList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? restaurants.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.addr.toLowerCase().includes(q) ||
    r.cuisine.toLowerCase().includes(q)
  ) : restaurants;
  render(filtered);
}
