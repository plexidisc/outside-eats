<style>
:root {
  --navy: #1B2A4A; --cream: #FAFAF8; --light-blue: #F0F3F8;
  --green: #3B6D11; --green-light: #EAF3DE;
  --border-blue: #D8DEE8; --ink: #1A1A1A; --ink-faint: #999;
  --amber: #8B5E1A; --amber-light: #FEF3E2;
  --red: #1B2A4A; --ink-mid: #555; --border-mid: #D0D0CA;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--cream); color: var(--ink); }

/* BAR 1 */
.bar1 { background: var(--light-blue); border-bottom: 1px solid var(--border-blue); padding: 0; height: 56px; }
.bar1-inner { max-width: 1100px; margin: 0 auto; padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.logo-block { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.wordmark { font-family: 'DM Sans', sans-serif; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }
.wordmark-out { color: var(--ink); font-weight: 600; }
.wordmark-eats { color: var(--navy); font-weight: 800; }
.logo-sub { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); margin-top: 2px; }
.logo-divider { width: 1px; height: 32px; background: var(--border-blue); }
.btn-app { background: var(--navy); color: white; padding: 7px 14px; border-radius: 4px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 700; text-decoration: none; }

/* BAR 2 */
.bar2 { background: var(--navy); padding: 0; height: 38px; }
.bar2-inner { max-width: 1100px; margin: 0 auto; padding: 0 1rem; height: 38px; display: flex; align-items: center; }
.bar2-label { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: 0.04em; text-transform: uppercase; flex: 1; }

/* OPENINGS LIST */
.openings-list { max-width: 1100px; margin: 0 auto; background: white; }
.section-header { padding: 0.4rem 1rem; background: #6B2737; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: white; }
.opening-card { display: flex; border-bottom: 1px solid #EFEFEB; min-height: 90px; }
.opening-card:last-child { border-bottom: none; }
.opening-photo { width: 90px; min-width: 90px; overflow: hidden; flex-shrink: 0; background: #EEE; align-self: stretch; }
.opening-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.opening-photo-placeholder { width: 100%; height: 100%; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.opening-body { flex: 1; padding: 0.55rem 0.85rem; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.opening-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
.opening-name { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); }
.opening-rating { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.rating-score { font-size: 13px; font-weight: 600; color: var(--ink); }
.rating-stars { color: var(--red); font-size: 11px; letter-spacing: -1px; }
.rating-count { font-size: 11px; color: var(--ink-faint); white-space: nowrap; }
.opening-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; flex-wrap: nowrap; overflow: hidden; min-width: 0; }
.meta-tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-mid); font-weight: 500; }
.meta-dot { color: var(--border-mid); font-size: 10px; }
.meta-price { color: var(--green); font-weight: 600; font-size: 12px; }
.hours-open { font-size: 11px; font-weight: 600; color: var(--green); }
.hours-closed { font-size: 11px; font-weight: 600; color: #c0392b; }
.opening-snippet { font-size: 12px; color: var(--ink-mid); line-height: 1.5; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.opening-footer { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.opening-address { font-size: 11px; color: var(--ink-faint); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.olink { font-size: 10px; font-weight: 700; padding: 3px 8px; border: 1px solid var(--navy); border-radius: 2px; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
.olink:hover { background: var(--navy); color: white; }

footer { background: var(--navy); color: rgba(255,255,255,0.5); padding: 1.25rem 1rem; text-align: center; font-size: 12px; }
footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

.hamburger-btn {
  background: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
  width: 36px; height: 32px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; cursor: pointer; flex-shrink: 0; padding: 0;
}
.hamburger-btn span { display: block; width: 16px; height: 2px; background: #1B2A4A; border-radius: 2px; }
.slide-panel {
  position: fixed; top: 0; right: -280px; width: 280px; height: 100vh;
  background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.15);
  z-index: 1000; transition: right 0.25s ease; display: flex; flex-direction: column;
}
.slide-panel.open { right: 0; }
.slide-panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.slide-panel-overlay.open { opacity: 1; pointer-events: all; }
.slide-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 1.25rem 1rem; border-bottom: 1px solid #E8E8E4;
}
.slide-panel-title {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase; color: #1B2A4A;
}
.slide-panel-close {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: #999; font-size: 20px; line-height: 1;
}
.slide-panel-close:hover { color: #1B2A4A; }
.slide-nav { padding: 0.75rem 0; }
.slide-nav-section {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: #999;
  padding: 0.75rem 1.25rem 0.35rem;
}
.slide-nav-item {
  display: block; padding: 0.65rem 1.25rem; font-family: 'Source Sans 3', sans-serif;
  font-size: 15px; font-weight: 500; color: #1A1A1A; text-decoration: none;
  transition: background 0.12s;
}
.slide-nav-item:hover { background: #F0F3F8; }
.slide-nav-item.coming-soon { color: #bbb; pointer-events: none; }
.slide-nav-item.coming-soon::after { content: ' — Coming Soon'; font-size: 11px; color: #ccc; }
@media (max-width: 640px) { .opening-name { font-size: 14px; } }

<script>
var CUISINE_MAP = {
  italian_restaurant:'Italian', japanese_restaurant:'Japanese', mexican_restaurant:'Mexican',
  chinese_restaurant:'Chinese', thai_restaurant:'Thai', indian_restaurant:'Indian',
  french_restaurant:'French', american_restaurant:'American', seafood_restaurant:'Seafood',
  pizza_restaurant:'Pizza', steak_house:'Steakhouse', sushi_restaurant:'Sushi',
  mediterranean_restaurant:'Mediterranean', greek_restaurant:'Greek',
  vietnamese_restaurant:'Vietnamese', korean_restaurant:'Korean',
  spanish_restaurant:'Spanish', peruvian_restaurant:'Peruvian',
  turkish_restaurant:'Turkish', bistro:'Bistro', gastropub:'Gastropub',
  brunch_restaurant:'Brunch', breakfast_restaurant:'Breakfast',
  vegan_restaurant:'Vegan', vegetarian_restaurant:'Vegetarian',
};

function getCuisine(types) {
  if (!types || !types.length) return 'Restaurant';
  for (var i = 0; i < types.length; i++) { if (CUISINE_MAP[types[i]]) return CUISINE_MAP[types[i]]; }
  return 'Restaurant';
}

function priceLabel(level) {
  if (!level) return '';
  var map = { PRICE_LEVEL_FREE:'Free', PRICE_LEVEL_INEXPENSIVE:'$', PRICE_LEVEL_MODERATE:'$$', PRICE_LEVEL_EXPENSIVE:'$$$', PRICE_LEVEL_VERY_EXPENSIVE:'$$$$' };
  return map[level] || '';
}

function starsHTML(rating) {
  var full = Math.floor(rating);
  var half = (rating - full) >= 0.5 ? 1 : 0;
  var empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
}

function getHoursStatus(r) {
  var descs = r.weekdayDescriptions;
  if (!descs) return '';
  var today = new Date().getDay();
  var idx = today === 0 ? 6 : today - 1;
  var desc = descs[idx] || '';
  var hours = desc.replace(/^[^:]+:\s*/, '');
  if (!hours) return '';
  if (hours.toLowerCase() === 'closed') return '<span class="hours-closed">Closed today</span>';
  return '<span class="hours-open">Open</span> <span style="font-size:11px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;display:inline-block;vertical-align:middle;">' + hours + '</span>';
}

(function () {
  var list = document.getElementById('openings-list');
  if (typeof OPENINGS_DATA === 'undefined') {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:#999;">Run <code>node prebake-openings.js</code> to generate openings-data.js</div>';
    return;
  }

  var sections = [], sectionMap = {};
  OPENINGS_DATA.forEach(function (r) {
    if (!sectionMap[r.section]) { sectionMap[r.section] = []; sections.push(r.section); }
    sectionMap[r.section].push(r);
  });

  var html = '';
  sections.forEach(function (section) {
    html += '<div class="section-header">' + section + '</div>';
    sectionMap[section].forEach(function (r) {
      var photo = r.photoUrl
        ? '<img src="' + r.photoUrl + '" alt="' + r.name + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=opening-photo-placeholder>&#x1F374;</div>\'">'
        : '<div class="opening-photo-placeholder">&#x1F374;</div>';

      var ratingHTML = '';
      if (r.rating) {
        ratingHTML = '<div class="opening-rating">'
          + '<span class="rating-score">' + r.rating.toFixed(1) + '</span>'
          + '<span class="rating-stars">' + starsHTML(r.rating) + '</span>'
          + (r.userRatingCount ? '<span class="rating-count">(' + r.userRatingCount.toLocaleString() + ')</span>' : '')
          + '</div>';
      }

      var cuisine = getCuisine(r.types);
      var price = priceLabel(r.priceLevel);
      var hoursHTML = getHoursStatus(r);
      var metaHTML = '<div class="opening-meta">'
        + '<span class="meta-tag">' + cuisine + '</span>'
        + (price ? '<span class="meta-dot">·</span><span class="meta-price">' + price + '</span>' : '')
        + (hoursHTML ? '<span class="meta-dot">·</span>' + hoursHTML : '')
        + '</div>';

      var snippet = r.editorialSummary || r.highlights || '';
      var address = r.formattedAddress ? r.formattedAddress.replace(', USA', '') : '';

      html += '<div class="opening-card">'
        + '<div class="opening-photo">' + photo + '</div>'
        + '<div class="opening-body">'
        + '<div>'
        + '<div class="opening-top"><span class="opening-name">' + r.name + '</span>' + ratingHTML + '</div>'
        + metaHTML
        + (snippet ? '<div class="opening-snippet">' + snippet + '</div>' : '')
        + '</div>'
        + '<div class="opening-footer">'
        + (address ? '<span class="opening-address">' + address + '</span>' : '')
        + (r.websiteUrl ? '<a class="olink" href="' + r.websiteUrl + '" target="_blank">Website</a>' : '')
        + '</div>'
        + '</div>'
        + '</div>';
    });
  });
  list.innerHTML = html;
})();
</script>

<script>
function togglePanel() {
  document.getElementById('slidePanel').classList.toggle('open');
  document.getElementById('panelOverlay').classList.toggle('open');
}
function closePanel() {
  document.getElementById('slidePanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
}
</script>
